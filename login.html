<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Huertos Verticales</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header>
    <nav><a href="index.html" class="logo">HuertosVerticales🌿</a></nav>
  </header>

  <main>
    <h2>Inicio de Sesión</h2>
    <form id="loginForm" novalidate>
      <label for="email">Correo:</label>
      <input type="email" id="email" name="email" required maxlength="100" />
      
      <label for="password">Contraseña:</label>
      <input type="password" id="password" name="password" required minlength="4" maxlength="10" />

      <div id="errores" class="errores"></div>

      <button type="submit">Ingresar</button>
    </form>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errores = [];
      const regexEmail = /^[^\s@]+@(duoc\.cl|profesor\.duoc\.cl|gmail\.com)$/;

      if (!email) {
        errores.push("El correo es obligatorio.");
      } else if (email.length > 100) {
        errores.push("El correo no puede superar los 100 caracteres.");
      } else if (!regexEmail.test(email)) {
        errores.push("El correo debe terminar en @duoc.cl, @profesor.duoc.cl o @gmail.com");
      }

      if (!password) {
        errores.push("La contraseña es obligatoria.");
      } else if (password.length < 4 || password.length > 10) {
        errores.push("La contraseña debe tener entre 4 y 10 caracteres.");
      }

      const erroresDiv = document.getElementById('errores');
      erroresDiv.innerHTML = '';
      if (errores.length > 0) {
        errores.forEach(err => {
          const p = document.createElement('p');
          p.textContent = err;
          erroresDiv.appendChild(p);
        });
      } else {
        alert('Inicio de sesión exitoso');
        this.submit();
      }
    });
  </script>
</body>
</html>
